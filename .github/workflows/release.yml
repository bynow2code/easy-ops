# 工作流名称。GitHub 会在仓库的 "Actions" 标签下显示此名称
name: EasyOps Auto Release

# 定义如何触发工作流
on:
  # 手动触发工作流（在 GitHub 网页界面可以手动点击运行，方便调试）
  workflow_dispatch:

  # 推送任意 tag 时触发（只有当推送的标签名称以 v 开头时才会运行，例如 v1.0.0）
  push:
    tags:
      - v*

# 作业定义（一个工作流可以包含多个作业，这里有两个：Windows 与 macOS）
jobs:
  # ===================== Windows 发布作业 =====================
  # Electron 是 GUI 应用，无法在 Linux 上交叉打包 Windows 安装包，
  # 必须在 Windows runner 上调用原生工具链打包，因此单独占用一台 windows-latest 机器。
  release-windows:
    # 作业名称（在 GitHub Actions 界面中显示的名称）
    name: 构建并发布 Windows ${{ github.ref_name }}

    # 运行作业的机器类型（使用 GitHub 托管的 Windows 最新版虚拟机）
    runs-on: windows-latest

    # 权限配置（定义工作流需要哪些 GitHub API 权限）
    permissions:
      # 允许工作流写入仓库内容（创建 Release 所必需）
      contents: write

    # 步骤序列（按顺序执行的一系列任务）
    steps:
      # 步骤1：将代码仓库克隆到虚拟机中
      - name: 检出代码仓库
        # 使用 GitHub 官方的 checkout Action（v5，原生支持 Node.js 24 运行时）
        uses: actions/checkout@v5

      # 步骤2：在虚拟机中安装 Node.js 环境
      - name: 设置 Node.js 环境
        # 使用 GitHub 官方的 setup-node Action（v5，原生支持 Node.js 24 运行时）
        # ⚠️ v5 breaking change：当 package.json 含 packageManager 字段时会自动启用缓存
        #    我们显式指定了 cache: 'npm'，所以不受影响
        uses: actions/setup-node@v5
        with:
          # 指定要安装的 Node.js 版本
          node-version: 24
          # 启用 npm 依赖缓存，加速后续 npm ci（缓存 key 基于 package-lock.json）
          cache: 'npm'

      # 步骤3：让打出来的包版本号与触发的 tag 保持一致
      # electron-builder 用 package.json 里的 version 命名产物（如 EasyOps Setup 1.0.0.exe），
      # 而 git tag 是 v1.0.0，这里把前面的 v 去掉写回 package.json，避免产物名和 tag 对不上。
      - name: 同步版本号与 tag
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}".TrimStart('v')
          npm version $ver --no-git-tag-version --allow-same-version

      # 步骤4：安装根目录依赖（electron、electron-builder 等）
      - name: 安装根目录依赖
        run: npm ci

      # 步骤5：安装前端（client）依赖（React + Vite 等）
      - name: 安装前端依赖
        # working-directory 让后续命令在 client 子目录下执行，比用 cd 更稳定
        working-directory: client
        run: npm ci

      # 步骤5.5：安装后端（server）依赖（Express + CORS 等）
      # ⚠️ 这一步之前缺失，导致 CI 上 server/node_modules 不存在，
      #    打包时 extraResources 拷贝的是没有依赖的空壳 → 用户安装后闪退报错 Cannot find module 'express'
      - name: 安装后端依赖
        working-directory: server
        run: npm ci

      # 步骤6：构建并打包 Windows 安装包（未签名）
      # npm run electron-build = 先 build 前端（vite build），再用 electron-builder 打包 --win --x64
      # 产物：dist-electron/ 下的 nsis 安装包（.exe）和 zip 压缩包
      # GH_TOKEN 由 GitHub Actions 自动提供，electron-builder 检测 CI 环境后会用它把产物发布到 Release
      - name: 构建并打包 Windows 安装包
        run: npm run electron-build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 步骤7：在 GitHub 上创建 Release 并上传安装包
      - name: 创建 GitHub Release
        # 使用第三方 Action 自动创建 Release 并上传产物（v3，原生支持 Node.js 24 运行时）
        uses: softprops/action-gh-release@v3
        # 仅当前面步骤都成功时才发布
        if: success()
        with:
          # 自动根据本次 tag 的提交生成更新日志
          generate_release_notes: true
          # 如果匹配不到文件则直接报错（避免发布空 Release）
          fail_on_unmatched_files: true
          # 要上传到 Release 的文件（支持通配符）
          # .exe = nsis 安装包；.zip = 便携压缩包
          # latest.yml / *.blockmap = electron-updater 自动更新所需的元数据与增量更新信息
          files: |
            dist-electron/*.exe
            dist-electron/*.zip
            dist-electron/latest.yml
            dist-electron/*.blockmap
        env:
          # Release 操作同样需要写入权限的 token
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ===================== macOS 发布作业 =====================
  # 同理，macOS 安装包必须在 macos-latest 上打包，无法交叉编译。
  # 个人发布未做 Apple 签名与公证，用户下载后需在「系统设置→隐私与安全性」手动放行。
  release-macos:
    # 作业名称
    name: 构建并发布 macOS ${{ github.ref_name }}

    # 运行作业的机器类型
    # 使用 macOS 26 (Tahoe) 镜像——GitHub 已于 2026-06-15 起
    # 将 macos-latest 默认标签从此处迁移至 macOS 26，显式指定可消除弃用警告
    runs-on: macos-26

    # 串行依赖：等 Windows 作业完成后才开始
    # 原因：两个作业都会往同一个 tag 的 Release 写文件，并行可能冲突，串行最稳妥
    needs: release-windows

    # 权限配置
    permissions:
      contents: write

    # 步骤序列
    steps:
      # 步骤1：检出代码
      - name: 检出代码仓库
        uses: actions/checkout@v5

      # 步骤2：安装 Node.js
      - name: 设置 Node.js 环境
        # v5：原生支持 Node.js 24；显式 cache: 'npm' 覆盖 v5 的自动缓存行为
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'npm'

      # 步骤3：同步版本号（macOS 用 bash 语法，去掉 tag 前的 v）
      - name: 同步版本号与 tag
        run: |
          ver="${{ github.ref_name }}"
          ver="${ver#v}"
          npm version "$ver" --no-git-tag-version --allow-same-version

      # 步骤4：安装根目录依赖
      - name: 安装根目录依赖
        run: npm ci

      # 步骤5：安装前端依赖
      - name: 安装前端依赖
        working-directory: client
        run: npm ci

      # 步骤5.5：安装后端（server）依赖（Express + CORS 等）
      # ⚠️ 与 Windows 作业同理——缺失此步骤会导致打包后端缺少 node_modules → 运行时报错找不到 express 模块
      - name: 安装后端依赖
        working-directory: server
        run: npm ci

      # 步骤6：构建前端并打包 macOS（未签名，双架构）
      # npm run build = vite build 前端
      # npx electron-builder --mac --x64 --arm64 = 同时打出 Intel(x64) 与 Apple Silicon(arm64) 的 dmg + zip
      - name: 构建并打包 macOS 安装包
        run: npm run build && npx electron-builder --mac --x64 --arm64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 步骤7：上传到同一个 Release
      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v3
        if: success()
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          # .dmg = macOS 磁盘镜像安装包；.zip = 便携压缩包
          # latest-mac.yml = electron-updater 在 macOS 上定位更新所需的元数据
          files: |
            dist-electron/*.dmg
            dist-electron/*.zip
            dist-electron/latest-mac.yml
            dist-electron/*.blockmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
