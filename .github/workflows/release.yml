name: EasyOps Auto Release

on:
  workflow_dispatch:
  push:
    tags:
      - v*

jobs:
  # ===================== 创建 Release（轻量级，先跑完） =====================
  # 将 Release 创建与安装包构建分离：
  #   ① 先用轻量 Linux runner 快速创建空 Release（含 release notes）
  #   ② 再让 Windows 与 macOS 并行构建并各自上传产物到同一个 Release
  # 这样避免了串行等待，约节省一半时间。
  create-release:
    name: 创建 Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          # 仅创建 Release，不上传产物
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ===================== Windows 发布作业 =====================
  release-windows:
    name: 构建并发布 Windows ${{ github.ref_name }}
    runs-on: windows-latest
    needs: create-release
    permissions:
      contents: write
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v5

      - name: 设置 Node.js 环境
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'npm'

      - name: 同步版本号与 tag
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}".TrimStart('v')
          npm version $ver --no-git-tag-version --allow-same-version

      # 缓存 client/node_modules，基于 client/package-lock.json 的 hash
      - name: 缓存前端依赖
        uses: actions/cache@v5
        with:
          path: client/node_modules
          key: client-npm-${{ runner.os }}-${{ hashFiles('client/package-lock.json') }}
          restore-keys: client-npm-${{ runner.os }}-

      # 缓存 server/node_modules
      - name: 缓存后端依赖
        uses: actions/cache@v5
        with:
          path: server/node_modules
          key: server-npm-${{ runner.os }}-${{ hashFiles('server/package-lock.json') }}
          restore-keys: server-npm-${{ runner.os }}-

      # 缓存 electron-builder 下载的 Electron 二进制文件
      - name: 缓存 Electron 二进制
        uses: actions/cache@v5
        with:
          path: ${{ runner.temp }}/electron
          key: electron-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: electron-${{ runner.os }}-

      - name: 安装根目录依赖
        run: npm ci

      - name: 安装前端依赖
        working-directory: client
        run: npm ci --prefer-offline

      - name: 安装后端依赖
        working-directory: server
        run: npm ci --prefer-offline

      - name: 构建并打包 Windows 安装包
        run: npm run electron-build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ELECTRON_CACHE: ${{ runner.temp }}/electron

      - name: 上传 Windows 产物到 Release
        uses: softprops/action-gh-release@v3
        if: success()
        with:
          tag_name: ${{ github.ref_name }}
          fail_on_unmatched_files: true
          files: |
            dist-electron/*.exe
            dist-electron/*.zip
            dist-electron/latest.yml
            dist-electron/*.blockmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ===================== macOS 发布作业 =====================
  release-macos:
    name: 构建并发布 macOS ${{ github.ref_name }}
    runs-on: macos-26
    needs: create-release
    permissions:
      contents: write
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v5

      - name: 设置 Node.js 环境
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'npm'

      - name: 同步版本号与 tag
        run: |
          ver="${{ github.ref_name }}"
          ver="${ver#v}"
          npm version "$ver" --no-git-tag-version --allow-same-version

      - name: 缓存前端依赖
        uses: actions/cache@v5
        with:
          path: client/node_modules
          key: client-npm-${{ runner.os }}-${{ hashFiles('client/package-lock.json') }}
          restore-keys: client-npm-${{ runner.os }}-

      - name: 缓存后端依赖
        uses: actions/cache@v5
        with:
          path: server/node_modules
          key: server-npm-${{ runner.os }}-${{ hashFiles('server/package-lock.json') }}
          restore-keys: server-npm-${{ runner.os }}-

      - name: 缓存 Electron 二进制
        uses: actions/cache@v5
        with:
          path: ~/Library/Caches/electron
          key: electron-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: electron-${{ runner.os }}-

      - name: 安装根目录依赖
        run: npm ci

      - name: 安装前端依赖
        working-directory: client
        run: npm ci --prefer-offline

      - name: 安装后端依赖
        working-directory: server
        run: npm ci --prefer-offline

      - name: 构建并打包 macOS 安装包
        run: npm run build && npx electron-builder --mac --x64 --arm64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 上传 macOS 产物到 Release
        uses: softprops/action-gh-release@v3
        if: success()
        with:
          tag_name: ${{ github.ref_name }}
          fail_on_unmatched_files: true
          files: |
            dist-electron/*.dmg
            dist-electron/*.zip
            dist-electron/latest-mac.yml
            dist-electron/*.blockmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}