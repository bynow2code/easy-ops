name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # Windows：构建 nsis 安装包 + zip，可选代码签名
  # 需要的 secrets（可选，不填则产物为未签名）：
  #   WIN_CSC_LINK        证书文件（.pfx）的 base64 或下载地址
  #   WIN_CSC_KEY_PASSWORD 证书私钥密码
  # ---------------------------------------------------------------------------
  release-windows:
    name: Build & Release (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Sync version with tag
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}".TrimStart('v')
          npm version $ver --no-git-tag-version --allow-same-version

      - name: Install root dependencies
        run: npm ci

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      # 仅当 secret 真正存在时才注入签名变量，避免空字符串导致 electron-builder 报错
      - name: Prepare signing env (Windows)
        shell: pwsh
        run: |
          if ("${{ secrets.WIN_CSC_LINK }}") {
            echo "CSC_LINK=${{ secrets.WIN_CSC_LINK }}" >> $env:GITHUB_ENV
            echo "CSC_KEY_PASSWORD=${{ secrets.WIN_CSC_KEY_PASSWORD }}" >> $env:GITHUB_ENV
            Write-Host "Signing enabled"
          } else {
            Write-Host "No WIN_CSC_LINK secret, building unsigned"
          }

      - name: Build & package (Windows)
        run: npm run electron-build

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist-electron/*.exe
            dist-electron/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # macOS：构建 dmg + zip（x64 + arm64），可选 Apple 签名 + 公证
  # 需要的 secrets（可选，不填则产物为未签名、未公证）：
  #   MAC_CSC_LINK                  Apple 开发者证书 .p12 的 base64 或下载地址
  #   MAC_CSC_KEY_PASSWORD          p12 导出密码
  #   APPLE_ID                      苹果账号邮箱
  #   APPLE_APP_SPECIFIC_PASSWORD   专用密码（appleid.apple.com 生成）
  #   APPLE_TEAM_ID                 开发者团队 ID（10 位）
  # ---------------------------------------------------------------------------
  release-macos:
    name: Build & Release (macOS)
    runs-on: macos-latest
    needs: release-windows
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Sync version with tag
        run: |
          ver="${{ github.ref_name }}"
          ver="${ver#v}"
          npm version "$ver" --no-git-tag-version --allow-same-version

      - name: Install root dependencies
        run: npm ci

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Prepare signing env (macOS)
        run: |
          if [ -n "${{ secrets.MAC_CSC_LINK }}" ]; then
            echo "CSC_LINK=${{ secrets.MAC_CSC_LINK }}" >> "$GITHUB_ENV"
            echo "CSC_KEY_PASSWORD=${{ secrets.MAC_CSC_KEY_PASSWORD }}" >> "$GITHUB_ENV"
            echo "APPLE_ID=${{ secrets.APPLE_ID }}" >> "$GITHUB_ENV"
            echo "APPLE_APP_SPECIFIC_PASSWORD=${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}" >> "$GITHUB_ENV"
            echo "APPLE_TEAM_ID=${{ secrets.APPLE_TEAM_ID }}" >> "$GITHUB_ENV"
            echo "Signing enabled"
          else
            echo "No MAC_CSC_LINK secret, building unsigned"
          fi

      - name: Build & package (macOS)
        run: npm run build && npx electron-builder --mac --x64 --arm64

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist-electron/*.dmg
            dist-electron/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
