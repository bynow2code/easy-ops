name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # 推送 v* tag → 在 Windows 上构建未签名安装包并发布到 GitHub Release
  # 个人发布，无需任何证书或 secret，开箱即用
  release-windows:
    name: Build & Release (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      # 让打出来的包版本号与 tag 保持一致（去掉前面的 v）
      - name: Sync version with tag
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}".TrimStart('v')
          npm version $ver --no-git-tag-version --allow-same-version

      - name: Install root dependencies
        run: npm ci

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      # electron-build = 先 build client，再 electron-builder --win --x64（未签名）
      - name: Build & package (Windows)
        run: npm run electron-build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist-electron/*.exe
            dist-electron/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 推送 v* tag → 在 macOS 上构建未签名 dmg + zip（x64 + arm64）并发布
  # 个人发布，未签名/未公证；用户下载后需到「系统设置→隐私与安全性」手动放行
  release-macos:
    name: Build & Release (macOS)
    runs-on: macos-latest
    needs: release-windows   # 串行，避免两个 job 并发写同一个 Release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Sync version with tag
        run: |
          ver="${{ github.ref_name }}"
          ver="${ver#v}"
          npm version "$ver" --no-git-tag-version --allow-same-version

      - name: Install root dependencies
        run: npm ci

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      # 先 build client，再打包 macOS 双架构（未签名）
      - name: Build & package (macOS)
        run: npm run build && npx electron-builder --mac --x64 --arm64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist-electron/*.dmg
            dist-electron/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
