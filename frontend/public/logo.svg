<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
  </defs>
  <!-- 背景圆角矩形 -->
  <rect width="256" height="256" rx="40" fill="url(#bg)"/>
  
  <!-- 简洁的 E 字母 -->
  <text x="128" y="185" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-size="160" font-weight="900" fill="white">E</text>
  
  <!-- 底部装饰线 -->
  <rect x="48" y="200" width="160" height="16" rx="8" fill="white" opacity="0.9"/>
</svg>
